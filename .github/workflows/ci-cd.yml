name: SecureGuard CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===== STAGE 1: Lint =====
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8

      - name: Run flake8 linter
        run: |
          flake8 app/ tests/ scripts/ --max-line-length=120 --ignore=E501,W503

  # ===== STAGE 2: Tests =====
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: test-secret-key
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ===== STAGE 3: Security Scan (SAST) =====
  sast:
    name: SAST - Bandit Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r app/ -f json -o bandit-report.json --severity-level medium || true
          bandit -r app/ --severity-level medium || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ===== STAGE 4: Dependency Scan =====
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit || true

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  # ===== STAGE 5: Build Docker Image =====
  docker-build:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: [test, sast, dependency-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t secureguard:${{ github.sha }} .
          docker build -t secureguard:latest .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureguard:latest
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Run Trivy scan (JSON report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureguard:latest
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  # ===== STAGE 6: Pipeline Summary =====
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, sast, dependency-scan, docker-build]
    if: always()
    steps:
      - name: Pipeline Results
        run: |
          echo "========================================="
          echo "  SecureGuard CI/CD Pipeline Complete"
          echo "========================================="
          echo "  Lint:              ${{ needs.lint.result || 'skipped' }}"
          echo "  Tests:             ${{ needs.test.result }}"
          echo "  SAST (Bandit):     ${{ needs.sast.result }}"
          echo "  Dependency Scan:   ${{ needs.dependency-scan.result }}"
          echo "  Docker Build:      ${{ needs.docker-build.result }}"
          echo "========================================="