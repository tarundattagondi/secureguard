services:
  db:
    image: postgres:15
    container_name: secureguard_db
    environment:
      POSTGRES_USER: secureguard
      POSTGRES_PASSWORD: secureguard123
      POSTGRES_DB: secureguard_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureguard -d secureguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: secureguard_web
    environment:
      DATABASE_URL: postgresql://secureguard:secureguard123@db:5432/secureguard_db
      SECRET_KEY: secureguard-secret-key-change-in-production
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: secureguard_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata: